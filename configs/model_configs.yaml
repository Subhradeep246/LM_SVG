# Model configurations for SVG Scaling Laws study
# Each model varies in n_layer, n_head, n_embd, d_ff to achieve target param counts

tiny:
  n_layer: 4
  n_head: 4
  n_embd: 128
  d_ff: 512
  # Target: ~1M non-embedding parameters

small:
  n_layer: 6
  n_head: 6
  n_embd: 192
  d_ff: 768
  # Target: ~3M non-embedding parameters

medium:
  n_layer: 6
  n_head: 6
  n_embd: 384
  d_ff: 1536
  # Target: ~10M non-embedding parameters

large:
  n_layer: 10
  n_head: 8
  n_embd: 512
  d_ff: 2048
  # Target: ~30M non-embedding parameters

xl:
  n_layer: 12
  n_head: 12
  n_embd: 768
  d_ff: 3072
  # Target: ~88M non-embedding parameters
